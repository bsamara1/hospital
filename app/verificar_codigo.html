<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Verificar Código</title>
</head>
<body>

<h2>Verificação do Código</h2>

<input type="text" id="codigo" placeholder="Código de verificação">

<button id="verificar">Verificar</button>

<p id="mensagem"></p>

<div id="novaSenha" style="display:none;">

    <input type="password" id="senha1" placeholder="Nova palavra-passe">

    <input type="password" id="senha2" placeholder="Confirmar palavra-passe">

    <button id="guardarSenha">Guardar Palavra-passe</button>

</div>

<script src="js/verificar_codigo.js"></script>

</body>
</html>
