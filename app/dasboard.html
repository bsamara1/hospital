<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Hospital Agostinho Neto</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>Dashboard do Hospital</h1>

<nav>
<a href="marcacao.html">Marcar Consulta</a>
<a href="reagendamento.html">Reagendar</a>
<a href="#" onclick="logout()">Sair</a>
</nav>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total de Consultas</h3>
<p id="totalConsultas">0</p>
</div>

<div class="card">
<h3>Médicos</h3>
<p id="totalMedicos">4</p>
</div>

<div class="card">
<h3>Hoje</h3>
<p id="consultasHoje">0</p>
</div>

</div>
<h2>Atividade da Semana</h2>

<canvas id="graficoConsultas" width="400" height="200"></canvas>

<h2>Últimas Consultas</h2>

<table>
<thead>
<tr>
<th>Paciente</th>
<th>Médico</th>
<th>Data</th>
<th>Hora</th>
</tr>
</thead>

<tbody id="ultimasConsultas"></tbody>
</table>

</div>

<script src="js/storage.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
