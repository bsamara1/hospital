<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médico - Meu Perfil</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{display:flex;background:#f8fafc;min-height:100vh;}
.sidebar{width:260px;background:#0b2a4a;color:#fff;display:flex;flex-direction:column;padding:20px;}
.sidebar .logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:bold;margin-bottom:30px;}
.sidebar .logo img{width:50px;height:50px;object-fit:contain;}
.sidebar a{color:white;text-decoration:none;padding:12px 15px;margin:5px 0;display:flex;align-items:center;gap:10px;border-radius:8px;transition:0.3s;font-size:18px;}
.sidebar a:hover,.sidebar a.active{background:#163a63;}
.sidebar .bottom{margin-top:auto;}
.logout{color:#ff6b6b;}
.divider{height:1px;background:rgba(255,255,255,0.15);margin:12px 0;}

.main{flex:1;padding:30px 40px;overflow:auto;}
.profile-title-container{margin-bottom:25px;}
.profile-title-container h2{font-size:24px;color:#0b2a4a;font-weight:700;margin-bottom:4px;}
.profile-title-container p{font-size:14px;color:#64748b;}

.section-card{background:#ffffff;border-radius:12px;padding:30px;border:1px solid #e2e8f0;max-width:500px;}
.section-card h3{font-size:18px;color:#0b2a4a;margin-bottom:25px;font-weight:700;}

.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:13px;color:#475569;font-weight:600;margin-bottom:8px;}
.form-group input{width:100%;padding:12px 16px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;color:#334155;background-color:#ffffff;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:#1e40af;}

.btn-primary-blue{width:100%;padding:14px;border:none;border-radius:8px;background:#1e40af;color:#ffffff;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:10px;}
.btn-primary-blue:hover{background:#1e3a8a;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><img src="../assets/img/logo.png" alt="Logo"><span>HAN</span></div>
  <a href="index.html"><i class="fa fa-home"></i> Painel Principal</a>
  <a href="pacientes.html"><i class="fa fa-user"></i> Pacientes</a>
  <a href="agenda.html"><i class="fa fa-calendar"></i> Agenda</a>
  <a href="disponibilidade.html"><i class="fa fa-clock"></i> Disponibilidade</a>
  <div class="bottom"><div class="divider"></div><a class="logout" href="../login.html"><i class="fa fa-sign-out-alt"></i> Terminar sessão</a></div>
</div>

<div class="main">
  <div class="profile-title-container">
    <h2>Meu Perfil</h2>
    <p>Gerir informações da sua conta.</p>
  </div>

  <div class="section-card">
    <h3>Informações Pessoais</h3>

    <div class="form-group">
      <label for="nomePerfil">Nome Completo</label>
      <input type="text" id="nomePerfil">
    </div>

    <div class="form-group">
      <label for="emailPerfil">Email</label>
      <input type="email" id="emailPerfil">
    </div>

    <div class="form-group">
      <label for="tipoPerfil">Tipo de Utilizador</label>
      <input type="text" id="tipoPerfil" readonly style="background-color:#f8fafc;">
    </div>

    <div class="form-group">
      <label for="telefonePerfil">Telefone</label>
      <input type="text" id="telefonePerfil">
    </div>

    <button class="btn-primary-blue" onclick="salvarPerfil()">Guardar Alterações</button>
  </div>
</div>

<script>
const API_URL = "http://127.0.0.1:5000";
const utilizadorLogado = JSON.parse(localStorage.getItem("utilizador") || "null");

document.addEventListener("DOMContentLoaded", carregarPerfil);

async function carregarPerfil() {
    if (!utilizadorLogado) {
        window.location.href = "../login.html";
        return;
    }

    try {
        const res = await fetch(`${API_URL}/utilizador?email=${encodeURIComponent(utilizadorLogado.email)}`);
        const dados = await res.json();

        document.getElementById("nomePerfil").value = dados.nome || "";
        document.getElementById("emailPerfil").value = dados.email || "";
        document.getElementById("telefonePerfil").value = dados.telefone || "";
        document.getElementById("tipoPerfil").value = "Médico";
    } catch (erro) {
        alert("Não foi possível carregar o perfil.");
    }
}

async function salvarPerfil() {
    const dadosAtualizados = {
        emailOriginal: utilizadorLogado.email,
        nome: document.getElementById("nomePerfil").value.trim(),
        email: document.getElementById("emailPerfil").value.trim(),
        telefone: document.getElementById("telefonePerfil").value.trim()
    };

    try {
        const res = await fetch(`${API_URL}/utilizador`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dadosAtualizados)
        });
        const dados = await res.json();

        if (!dados.sucesso) {
            alert(dados.mensagem || "Erro ao atualizar perfil.");
            return;
        }

        alert("Perfil atualizado com sucesso!");
        utilizadorLogado.nome = dadosAtualizados.nome;
        utilizadorLogado.email = dadosAtualizados.email;
        localStorage.setItem("utilizador", JSON.stringify(utilizadorLogado));
    } catch (erro) {
        alert("Erro na ligação ao servidor.");
    }
}
</script>
</body>
</html>
