<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receção - Todos os Pacientes</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            display: flex;
            background: #f5f7fb;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #0b2a4a;
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            position: fixed;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .logo img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .bottom {
            margin-top: auto;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 15px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #163a63;
        }

        .sidebar .logout {
            color: #ff6b6b;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 12px 0;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 25px;
            margin-left: 260px;
            overflow: auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-line {
            margin-left: -25px;
            margin-right: -25px;
            height: 1px;
            background: rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #555;
        }

        .user-profile-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .user-profile-link:hover {
            background: #e2e8f0;
        }

        .avatar-circle {
            width: 35px;
            height: 35px;
            background: #1e40af;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* DASHBOARD GRID / RESUMO */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .card h4 {
            font-size: 14px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
            color: #0b2a4a;
        }

        /* SECÇÕES */
        .section-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .section-card h3 {
            margin-bottom: 20px;
            color: #0b2a4a;
            font-size: 18px;
        }

        /* FORMULÁRIO COMPACTO */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            width: 100%;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #1e40af;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        /* BARRA DE PESQUISA */
        .search-container {
            margin-bottom: 20px;
            position: relative;
            max-width: 400px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-container input:focus {
            border-color: #1e40af;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        /* TABELA */
        .table-responsive-scroll {
            max-height: 420px;
            overflow-y: auto;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            text-align: left;
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            background: #f8fafc;
            color: #475569;
            position: sticky;
            top: 0;
            z-index: 2;
            box-shadow: inset 0 -1px 0 #e2e8f0;
            font-weight: 600;
        }

        /* BOTÕES */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; }
        .btn-primary { background: #1e40af; color: #fff; }
        
        .view-btn { 
            padding: 6px 12px; 
            background: #1e40af; 
            color: #fff; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="../assets/img/logo.png" alt="Logo HAN">
            <span>HAN</span>
        </div>
        <a href="index.html" data-page="index"><i class="fa fa-chart-pie"></i> Painel Principal</a>
        <a href="pacientes.html" data-page="pacientes" class="active"><i class="fa fa-user"></i> Pacientes</a>
        <a href="consultas.html" data-page="consultas"><i class="fa fa-calendar-alt"></i> Consultas</a>
        <a href="agenda.html" data-page="agenda"><i class="fa fa-calendar-check"></i> Agenda Médica</a>
        <a href="presencas.html" data-page="presencas"><i class="fa fa-id-badge"></i> Confirmar Presença</a>
        <div class="bottom">
            <div class="divider"></div>
            <a class="logout" href="../login.html"><i class="fa fa-sign-out-alt"></i> Terminar sessão</a>
        </div>
    </div>

    <div class="main">
        <!-- HEADER -->
        <div class="header">
            <h2>Gestão de Pacientes</h2>
            <div class="user-box">
                <a href="notificacoes.html" style="position:relative; color:inherit; margin-right: 5px; text-decoration: none;">
                    <i class="fa fa-bell"></i>
                    <span id="notifBadge" style="display:none; position:absolute; top:-6px; right:-6px; background:#dc3545; color:#fff; font-size:10px; padding:1px 5px; border-radius:10px;"></span>
                </a>
                <a href="perfil.html" class="user-profile-link">
                    <div class="avatar-circle" id="usuarioAvatar">-</div>
                    <div style="display:flex; flex-direction:column; line-height:1.1;">
                        <span id="usuarioNome" style="font-weight:700;">A carregar...</span>
                        <span id="usuarioEmail" style="font-size:12px; color:#888;">...</span>
                    </div>
                </a>
            </div>
        </div>
        <div class="header-line"></div>

        <!-- CONTADORES EXCLUSIVOS DE PACIENTES -->
        <div class="dashboard-grid">
            <div class="card">
                <h4>Total de Pacientes</h4>
                <p id="totalPacientes">0</p>
            </div>
            <div class="card">
                <h4>Pacientes Filtrados / Ativos</h4>
                <p id="pacientesAtivos">0</p>
            </div>
        </div>

        <!-- FICHA DE INSCRIÇÃO CONECTADA AO SALVARPACIENTE DO PACIENTES.JS -->
        <div class="section-card">
            <h3>Ficha de Inscrição do Paciente</h3>
            <form id="form-user" onsubmit="event.preventDefault(); salvarPaciente();">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="pacienteNome">Nome Completo</label>
                        <input type="text" id="pacienteNome" placeholder="Ex: Benedita Tavares" required>
                    </div>
                    <div class="form-group">
                        <label for="pacienteBI">BI / CNI</label>
                        <input type="text" id="pacienteBI" placeholder="Ex: 20050714F001N" required>
                    </div>
                    <div class="form-group">
                        <label for="pacienteDataNascimento">Data de Nascimento</label>
                        <input type="date" id="pacienteDataNascimento" required>
                    </div>
                    <div class="form-group">
                        <label for="pacienteSexo">Sexo</label>
                        <select id="pacienteSexo" required>
                            <option value="">Selecione...</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Feminino">Feminino</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pacienteTelefone">Telefone</label>
                        <input type="text" id="pacienteTelefone" placeholder="Ex: 99112233">
                    </div>
                    <div class="form-group">
                        <label for="pacienteEmail">Email</label>
                        <input type="email" id="pacienteEmail" placeholder="Ex: benedita@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="pacienteSenha">Senha de Acesso</label>
                        <input type="password" id="pacienteSenha" placeholder="Definir senha provisória" required minlength="4">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Registrar Paciente</button>
                </div>
            </form>
        </div>

        <!-- LISTAGEM CONECTADA AO RENDERTABELAPACIENTES DO PACIENTES.JS -->
        <div class="section-card">
            <h3>Todos os Pacientes</h3>
            
            <div class="search-container">
                <i class="fa fa-search"></i>
                <input type="text" id="pesquisaPaciente" placeholder="Pesquise por nome, BI ou email...">
            </div>

            <div class="table-responsive-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>BI / CNI</th>
                            <th>Data Nascimento</th>
                            <th>Sexo</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th style="text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="pacientesTabela"></tbody>
                </table>
            </div>
        </div>
    </div>

   <script src="../Admin/storage.js"></script>
    <script src="js/pacientes.js"></script>
    <script src="js/recepcionista-common.js"></script>
    
    <script>
        
        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function formatDate(dateStr) {
            if (!dateStr || dateStr === "-") return "—";
            const parts = dateStr.split("-");
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateStr;
        }

        // Carrega as informações básicas do perfil do usuário logado na receção
        window.addEventListener("DOMContentLoaded", function() {
            const utilizador = JSON.parse(localStorage.getItem("utilizador"));
            if (utilizador) {
                if (document.getElementById("usuarioNome") && utilizador.nome) document.getElementById("usuarioNome").innerText = utilizador.nome;
                if (document.getElementById("usuarioEmail") && utilizador.email) document.getElementById("usuarioEmail").innerText = utilizador.email;
                if (document.getElementById("usuarioAvatar") && utilizador.nome) {
                    const partes = utilizador.nome.trim().split(" ");
                    const sigla = partes.length > 1 ? (partes[0][0] + partes[partes.length - 1][0]) : partes[0][0];
                    document.getElementById("usuarioAvatar").innerText = sigla.toUpperCase();
                }
            }
        });
    </script>
</body>

</html>
