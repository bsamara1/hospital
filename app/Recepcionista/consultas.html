<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultas - Rececionista</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
  body { display: flex; background: #f5f7fb; height: 100vh; }
  .sidebar { width: 260px; background: #0b2a4a; color: #fff; display: flex; flex-direction: column; padding: 20px; position: fixed; height: 100vh; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: bold; margin-bottom: 30px; }
  .logo img { width: 50px; height: 50px; }
  .bottom { margin-top: auto; }
  .sidebar a { color: white; text-decoration: none; padding: 12px 15px; display: flex; align-items: center; gap: 10px; border-radius: 8px; margin: 5px 0; }
  .sidebar a.active { background: #163a63; }
  .main { flex: 1; padding: 25px; margin-left: 260px; overflow: auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  .add-btn { background: #1e40af; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  .header-line { height: 1px; background: rgba(0,0,0,0.08); margin-bottom: 25px; }
  .search-row { display: flex; gap: 15px; margin-bottom: 20px; }
  .search-row input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
  .search-row select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
  .cards { display: flex; gap: 20px; margin-bottom: 25px; }
  .card { background: white; padding: 20px; flex: 1; border-radius: 12px; border: 1px solid #e2e8f0; }
  .table-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; }
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th, td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
  th { background: #f8fafc; }
  .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
  .badge.pendente { background: #fef3c7; color: #d97706; }
  .badge.confirmada { background: #dcfce7; color: #15803d; }
  .badge.cancelada { background: #fee2e2; color: #b91c1c; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
  .modal-card { background: white; padding: 30px; border-radius: 12px; width: 450px; display: flex; flex-direction: column; gap: 15px; position: relative; }
  .modal-close { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; border: none; background: none; }
  .modal-card select, .modal-card input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
  button.confirm { background: #16a34a; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  button.edit { background: #d97706; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  button.cancel { background: #dc2626; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  button.view { background: #4b5563; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><img src="../assets/img/logo.png" alt="Logo"><span>HAN</span></div>
  <a href="index.html" data-page="index"><i class="fa fa-chart-pie"></i> Painel Principal</a>
  <a href="pacientes.html" data-page="pacientes"><i class="fa fa-user"></i> Pacientes</a>
  <a href="consultas.html" data-page="consultas" class="active"><i class="fa fa-calendar-alt"></i> Consultas</a>
  <a href="agenda.html" data-page="agenda"><i class="fa fa-calendar-check"></i> Agenda Médica</a>
  <a href="presencas.html" data-page="presencas"><i class="fa fa-id-badge"></i> Confirmar Presença</a>
</div>

<div class="main">
  <div class="header">
    <h2>Gestão de Consultas</h2>
    <button class="add-btn" type="button" onclick="abrirModalMarcar()"><i class="fa fa-plus"></i> Marcar Consulta</button>
  </div>
  <div class="header-line"></div>

  <div class="search-row">
    <input id="pesquisaConsulta" type="text" placeholder="Pesquisar por paciente, médico ou especialidade">
    <select id="filtroEstado">
      <option value="">Todos os estados</option>
      <option value="pendente">Pendente</option>
      <option value="confirmada">Confirmada</option>
      <option value="cancelada">Cancelada</option>
      <option value="presente">Presente</option>
      <option value="realizada">Realizada</option>
    </select>
  </div>

  <div class="cards">
    <div class="card"><h4>Pendentes</h4><p id="cardPendentes">0</p></div>
    <div class="card"><h4>Confirmadas</h4><p id="cardConfirmadas">0</p></div>
    <div class="card"><h4>Canceladas</h4><p id="cardCanceladas">0</p></div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Paciente</th>
          <th>Médico</th>
          <th>Especialidade</th>
          <th>Data</th>
          <th>Hora</th>
          <th>Estado</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaConsultas"></tbody>
    </table>
  </div>
</div>

<!-- MODAL MARCAÇÃO/EDIÇÃO -->
<div id="modalConsulta" class="modal-overlay">
  <div class="modal-card">
    <button class="modal-close" type="button" onclick="fecharModal()">×</button>
    <h3 id="modalTitulo">Marcar Consulta</h3>
    <select id="consultaPaciente"></select>
    <select id="consultaEspecialidade" onchange="preencherMedicosModal()"></select>
    <select id="consultaMedico"></select>
    <input id="consultaData" type="date">
    <input id="consultaHora" type="time">
    <div class="modal-actions">
      <button style="background:#64748b; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;" type="button" onclick="fecharModal()">Cancelar</button>
      <button class="add-btn" type="button" onclick="guardarConsulta()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHES -->
<div id="modalDetalhes" class="modal-overlay">
  <div class="modal-card">
    <button class="modal-close" type="button" onclick="fecharDetalhes()">×</button>
    <h3>Detalhes da Consulta</h3>
    <div id="detalhesConteudo" style="margin-top:10px; line-height:1.6;"></div>
  </div>
</div>

<script src="js/recepcionista-common.js"></script>
<script src="js/consultas.js"></script>
</body>
</html>
