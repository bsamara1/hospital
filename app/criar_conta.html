<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Criar Conta - Hospital Agostinho Neto</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="register-container">

        <!-- LADO ESQUERDO -->
        <div class="register-left">

            <div class="register-logo-box">

                <div class="register-branding">
                    <img src="../app/assets/img/logo.png" class="register-logo" alt="Logo HAN">
                    <h1>HAN</h1>
                </div>

                <p class="p1">Hospital Agostinho Neto</p>
                <p class="p1">Sistema de Gestão Hospitalar</p>
            </div>

            <img src="../app/assets/img/hospital.png" class="register-image" alt="Hospital">

        </div>

        <!-- LADO DIREITO -->
        <div class="register-right">

            <div class="register-card">

                <h2>Criar Conta</h2>

                <p>Preencha os campos abaixo para criar a sua conta.</p>

                <form id="criarContaForm">

                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite o nome completo" required>

                    <label for="bi">Número do BI</label>
                    <input type="text" id="bi" placeholder="Digite o número do BI" required>

                    <div class="linha-dupla">

                        <div class="campo">
                            <label for="dataNascimento">Data de Nascimento</label>
                            <input type="date" id="dataNascimento" required>
                        </div>

                        <div class="campo">
                            <label for="sexo">Sexo</label>

                            <select id="sexo" required>
                                <option value="">Selecione</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                            </select>

                        </div>

                    </div>

                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="Digite o número de telefone" required>

                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite o e-mail" required>

                    <label for="senha">Palavra-passe</label>
                    <input type="password" id="senha" placeholder="Digite a palavra-passe" required>

                    <label for="confirmarSenha">Confirmar Palavra-passe</label>
                    <input type="password" id="confirmarSenha" placeholder="Confirme a palavra-passe" required>

                    <button type="submit">
                        Criar Conta
                    </button>

                </form>

                <p class="register-footer">
                    Já tem uma conta?
                    <a href="login.html">Entrar</a>
                </p>

                <p id="mensagem"></p>

            </div>

        </div>

    </div>

    <script src="js/criar_conta.js"></script>

</body>

</html>
